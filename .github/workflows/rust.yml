name: Build Release Binaries

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [created]

permissions:
  contents: write

# ── Fast CI — runs on every push and PR ─────────────────────────────────────
# Catches issues before they reach a release build.
# Single Linux runner, debug mode — finishes in ~2 min.
jobs:
  ci:
    name: Check & Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test

# ── Release — only on GitHub Release creation ────────────────────────────────
# Skips lint/fmt (already caught by CI above).
# Builds all targets and uploads binaries.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release'

    strategy:
      matrix:
        include:
          # Linux x64
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: fileshare

          # Windows x64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: fileshare.exe

          # macOS ARM (Apple Silicon)
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary_name: fileshare

          # Raspberry Pi (ARMv8 / ARM64)
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: fileshare

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      # --- NEW STEP: RUN TESTS ---
      - name: Run tests
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # 'cross test' runs tests inside a QEMU-emulated docker container
            cross test --release --target ${{ matrix.target }}
          else
            cargo test --release --target ${{ matrix.target }}
          fi

      # --- EXISTING STEPS ---
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Collect binary
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/

      - name: Archive
        run: |
          cd dist
          tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.binary_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.tar.gz
